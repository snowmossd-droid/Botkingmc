name: Minecraft AFK Bot

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Tạo config
        env:
          MC_USERNAME: ${{ secrets.MC_USERNAME }}
          MC_HOST: ${{ secrets.MC_HOST }}
          MC_PORT: ${{ secrets.MC_PORT }}
          MC_VERSION: ${{ secrets.MC_VERSION }}
          MC_PASSWORD: ${{ secrets.MC_PASSWORD }}
          MC_REGISTERED: ${{ secrets.MC_REGISTERED }}
          AFK_SLOT: ${{ secrets.AFK_SLOT }}
        run: |
          node -e "
          const cfg = {
            username: process.env.MC_USERNAME,
            host: process.env.MC_HOST,
            port: parseInt(process.env.MC_PORT) || 25565,
            version: process.env.MC_VERSION,
            respawn: false,
            registered: process.env.MC_REGISTERED === 'true',
            botPassword: process.env.MC_PASSWORD,
            afkSlot: parseInt(process.env.AFK_SLOT) || 0,
          };
          require('fs').writeFileSync('config.json', JSON.stringify(cfg, null, 2));
          console.log('Config tạo thành công!');
          console.log('Host:', cfg.host, '| User:', cfg.username, '| Version:', cfg.version);
          "

      - name: Chạy bot
        run: node index.js
