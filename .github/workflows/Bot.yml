name: Minecraft AFK Bot

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Tạo config từ Secrets
        run: |
          cat > config.json << ENDOFCONFIG
          {
            "username": "${{ secrets.MC_USERNAME }}",
            "host": "${{ secrets.MC_HOST }}",
            "port": ${{ secrets.MC_PORT }},
            "version": "${{ secrets.MC_VERSION }}",
            "respawn": false,
            "registered": ${{ secrets.MC_REGISTERED }},
            "botPassword": "${{ secrets.MC_PASSWORD }}",
            "afkSlot": ${{ secrets.AFK_SLOT }},
            "discord": {
              "token": "${{ secrets.DISCORD_TOKEN }}",
              "logChannelId": "${{ secrets.DISCORD_CHANNEL_ID }}"
            }
          }
          ENDOFCONFIG

      - name: Chạy bot
        run: node index.js
        
